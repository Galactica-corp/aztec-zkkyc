services:
  guardian-backend:
    image: aztec-guardian-monorepo-dev
    build:
      context: ../..
      dockerfile: services/guardian-backend/Dockerfile
    env_file:
      - ./.env
    environment:
      PORT: "3004"
    ports:
      - "3004:3004"
    command: ["yarn", "start"]
    working_dir: /workspace/services/guardian-backend

  guardian-frontend-reference:
    image: aztec-guardian-monorepo-dev
    build:
      context: ../..
      dockerfile: services/guardian-backend/Dockerfile
    env_file:
      - ../../apps/guardian-frontend-reference/.env
    environment:
      # Keep the Docker-only backend hostname in a server-side env var so the browser
      # still requests `/api/...` from the frontend origin and Vite proxies internally.
      BACKEND_PROXY_TARGET: "http://guardian-backend:3004"
      VITE_PORT: "3005"
    ports:
      - "3005:3005"
    depends_on:
      - guardian-backend
    # Bind on all interfaces and pin the internal dev-server port to the one we publish.
    command: ["yarn", "dev", "--", "--host", "0.0.0.0", "--port", "3005"]
    working_dir: /workspace/apps/guardian-frontend-reference

